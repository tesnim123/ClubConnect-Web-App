name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        # Assurez-vous d'avoir configuré ces secrets dans votre dépôt GitHub (Settings > Secrets and variables > Actions)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/clubconnect-backend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/clubconnect-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/clubconnect-backend:buildcache,mode=max

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ secrets.DOCKER_USERNAME }}/clubconnect-frontend:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/clubconnect-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/clubconnect-frontend:buildcache,mode=max
