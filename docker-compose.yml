version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clubconnect-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clubconnect-frontend
    ports:
      - "8080:80" # Maps localhost:8080 to container port 80 (NGINX)
    environment:
      - VITE_API_URL=https://clubconnect-backend-production.up.railway.app/api
    depends_on:
      - backend
    restart: unless-stopped
